            .print-clear-card {

            /* การ์ดความสามารถการผ่อนชำระรายได้อื่น / รายย่อย */

            /* เพิ่มเติมสไตล์ปรับขนาดตัวอักษรและตารางของหน้า 2 YTD Audit ให้ชัดเจนและตัวใหญ่ขึ้น */
            .print-page-2 h2 {

            .print-page-2 table th {

            /* ควบคุมกฎการจัดสรรหน้าเมื่อสั่งพิมพ์แบบหน้าหลัง (Duplex printing) */

                height: 100% !important;

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen font-sans">
    <div id="root"></div>

    <script>
        const { useState, useEffect, createElement: e } = React;

        // ระยะเวลาเก็บรักษาข้อมูลในประวัติ (90 วัน ในหน่วยมิลลิวินาที)
        const RETENTION_PERIOD_MS = 90 * 24 * 60 * 60 * 1000;

        // ฟังก์ชันจัดฟอร์แมตตัวเลขหลักพัน (ใส่คอมมา)
        function formatNum(num) {
            const n = Math.round(Number(num));
            return isNaN(n) ? "0" : n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        // ฟังก์ชันจัดฟอร์แมตตัวเลขทศนิยม 2 ตำแหน่ง
        function formatDecimal(num) {
            const n = Number(num);
            return isNaN(n) ? "0.00" : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // รายชื่อบริษัทเฝ้าระวังเริ่มต้นเป็นข้อมูลตัวอย่าง
        const defaultWatchlist = [
            { id: 1, name: "บจก. เทคโนโลยี ปลอมแปลงการเงิน", remark: "เคยมีประวัติเอกสารรับรองเงินเดือนปลอมแปลง ให้ระมัดระวังเป็นพิเศษและสืบค้นเบอร์ตรงสำนักงานใหญ่" },
            { id: 2, name: "สมมติ ดีไซน์ แอนด์ บิวท์", remark: "ผู้มีอำนาจลงนามไม่อยู่ในประเทศไทย หนังสือรับรองเงินเดือนมักส่งมาเป็นสำเนารูปถ่ายสแกน ให้ตรวจสอบใบเสร็จประกันสังคมประกอบ" },
            { id: 3, name: "บมจ. อภิมหาโปรเจค กรุ๊ป", remark: "อยู่ในกลุ่มเสี่ยงจดทะเบียนสถานประกอบการว่างเปล่า ตรวจสอบแผนที่ที่ตั้งบริษัทว่ามีอยู่จริงหรือไม่" }
        ];

        // ฟังก์ชันล้างค่าตัวอักษรเพื่อเช็คความคล้ายคลึงของชื่อบริษัท (กำจัดส่วนขยายต่างๆ)
        const cleanCompanyName = (name) => {
            if (!name) return '';
            return name.replace(/(บริษัท|จำกัด|มหาชน|บจก\.|บมจ\.|จำกัด\s*\(มหาชน\))/g, '')
                       .replace(/\s+/g, '')
                       .toLowerCase();
        };

        // ฟังก์ชันคำนวณหาค่าความคล้ายคลึง (Fuzzy String Similarity - Bigram Coefficient)
        const checkSimilarity = (userComp, watchComp) => {
            const cleanUser = cleanCompanyName(userComp);
            const cleanWatch = cleanCompanyName(watchComp);
            if (!cleanUser || !cleanWatch) return false;
            
            // 1. ตรวจสอบในกรณีชื่อตรงกันทั้งหมดหรือมีส่วนย่อยที่ซ้อนทับกันเต็มพิกัด
            if (cleanUser === cleanWatch) return true;
            if (cleanUser.includes(cleanWatch) || cleanWatch.includes(cleanUser)) return true;
            
            // 2. ตรวจสอบความคล้ายระดับตัวอักษร (Bigram similarity)
            const getBigrams = (str) => {
                const bigrams = new Set();
                for (let i = 0; i < str.length - 1; i++) {
                    bigrams.add(str.substring(i, i + 2));
                }
                return bigrams;
            };
            
            const b1 = getBigrams(cleanUser);
            const b2 = getBigrams(cleanWatch);
            if (b1.size === 0 || b2.size === 0) return false;
            
            let intersection = 0;
            b1.forEach(val => {
                if (b2.has(val)) intersection++;
            });
            
            const similarity = (2 * intersection) / (b1.size + b2.size);
            return similarity > 0.55; // ถ้าความคล้ายคลึงกันเกิน 55% ให้ขึ้นสัญญาณแจ้งเตือน
        };

        function CurrencyInput({ value, onChange, className, disabled, isRed, containerClass, placeholder, allowDecimal }) {
            const [isFocused, setIsFocused] = useState(false);
            const [expression, setExpression] = useState('');

            const safeEvaluate = (str) => {
                if (!str) return 0;
                let clean = str.toString().replace(/\s+/g, '');
                if (!/^[0-9+\-*/().]+$/.test(clean)) {
                    return NaN;
                }
                try {
                    const fn = new Function(`return (${clean})`);
                    const result = fn();
                    return typeof result === 'number' && !isNaN(result) ? result : NaN;
                } catch (err) {
                    return NaN;
                }
            };

            useEffect(() => {
                if (!isFocused) {
                    const currentEval = safeEvaluate(expression);
                    if (isNaN(currentEval) || Math.abs(currentEval - Number(value)) > 0.01) {
                        setExpression(value === 0 || value === '0' ? '' : String(value));
                    }
                }
            }, [value, isFocused]);

            const handleFocus = () => {
                setIsFocused(true);
                setExpression(expression === '0' ? '' : expression);
            };

            const handleBlur = () => {
                setIsFocused(false);
                const evaluated = safeEvaluate(expression);
                if (!isNaN(evaluated)) {
                    const finalVal = allowDecimal ? evaluated.toString() : Math.round(evaluated).toString();
                    onChange(finalVal);
                } else {
                    const fallback = parseFloat(value) || 0;
                    setExpression(fallback === 0 ? '' : fallback.toString());
                    onChange(fallback.toString());
                }
            };

            const handleChange = (event) => {
                const val = event.target.value;
                if (/^[0-9+\-*/().\s]*$/.test(val)) {
                    setExpression(val);
                    const evaluated = safeEvaluate(val);
                    if (!isNaN(evaluated)) {
                        onChange(allowDecimal ? evaluated.toString() : Math.round(evaluated).toString());
                    }
                }
            };

            const isFormula = /[+\-*/]/.test(expression) && !isNaN(safeEvaluate(expression));
            const hasCustomPadding = className && (className.includes('px-') || className.includes('py-'));
            const paddingClasses = hasCustomPadding ? '' : 'px-3 py-1.5';
            const widthClass = containerClass && (containerClass.includes('w-') || containerClass.includes('max-w-')) ? '' : 'w-full';

            return e('div', { className: `relative ${widthClass} ${containerClass || ''}` }, [
                isFormula && !isFocused && e('span', {
                    key: 'fx-badge',
                    className: 'absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-black bg-emerald-100 text-emerald-700 px-1 py-0.5 rounded border border-emerald-300 pointer-events-none select-none z-10 animate-pulse'
                }, 'fx'),
                e('input', {
                    key: 'input-el',
                    type: "text",
                    value: isFocused ? expression : (allowDecimal ? formatDecimal(value) : formatNum(value)),
                    onFocus: handleFocus,
                    onBlur: handleBlur,
                    onChange: handleChange,
                    disabled: disabled,
                    placeholder: placeholder || (allowDecimal ? "0.00" : "0"),
                    className: `w-full ${paddingClasses} text-right border rounded-lg transition-all focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none ${
                        disabled 
                        ? 'bg-slate-100 text-slate-400 cursor-not-allowed border-slate-200' 
                        : 'border-slate-300 hover:border-slate-400'
                    } ${isRed ? 'text-rose-600 font-semibold' : 'text-slate-800'} ${className || ''} print:border-none print:shadow-none print:bg-transparent print:p-0 print:text-right print:font-bold`
                })
            ]);
        }

        function App() {
            const [customerName, setCustomerName] = useState('');
            const [companyName, setCompanyName] = useState(''); 
            const [loanAmount, setLoanAmount] = useState(''); 
            const [borrowerAge, setBorrowerAge] = useState(''); 
            
            const [customerType, setCustomerType] = useState('welfare'); 
            const [monthsCount, setMonthsCount] = useState(3); 
            const [employeeType, setEmployeeType] = useState('monthly'); 
            const [isManufacturing, setIsManufacturing] = useState(false);
            
            const [slipType, setSlipType] = useState('standard'); 
            
            const [isOverOneYear, setIsOverOneYear] = useState(false);
            const [isStableCompany, setIsStableCompany] = useState(false);
            const [useSpecialRetail, setUseSpecialRetail] = useState(true);

            const [hasExtraDeductions, setHasExtraDeductions] = useState(false);
            const [showVarDetails, setShowVarDetails] = useState(true);

            const [showYtdAudit, setShowYtdAudit] = useState(false);
            const [ytdData, setYtdData] = useState({});

            const [debtBurden, setDebtBurden] = useState(0);
            const [deductionOther, setDeductionOther] = useState(0);
            const [deductionLabel, setDeductionLabel] = useState('หักอื่นๆ'); 
            const [taxManual, setTaxManual] = useState(0); 
            
            // ระบบบัญชีดำ/เฝ้าระวังบริษัท
            const [watchlist, setWatchlist] = useState([]);
            const [matchedWatchlistCompany, setMatchedWatchlistCompany] = useState(null);
            
            // ระบบ Admin Panel
            const [isAdminModalOpen, setIsAdminModalOpen] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [adminNewName, setAdminNewName] = useState('');
            const [adminNewRemark, setAdminNewRemark] = useState('');

            // ระบบคัดลอก DBD
            const [dbdCopied, setDbdCopied] = useState(false);

            // ระบบ Custom Confirmation แทนระบบ confirm ของ Browser
            const [confirmConfig, setConfirmConfig] = useState(null);

            const [varColumns, setVarColumns] = useState([
                { id: 'ot', label: 'OT' },
                { id: 'comm', label: 'ค่าคอมมิชชั่น' },
                { id: 'extra', label: 'เบี้ยขยัน / ค่าเที่ยว' },
                { id: 'other', label: 'รายได้อื่น ๆ' }
            ]);

            const [incomeData, setIncomeData] = useState(Array.from({ length: 12 }, (_, i) => ({ 
                id: i, label: '', baseSalary: 0, ot: 0, comm: 0, extra: 0, other: 0, deduction: 0 
            })));

            const [welfarePercent, setWelfarePercent] = useState(0.8);
            const [retailFraction, setRetailFraction] = useState(0.3333); 

            const [history, setHistory] = useState([]);
            const [historySearchTerm, setHistorySearchTerm] = useState(''); 
            const [alertMessage, setAlertMessage] = useState(null);

            const calculatedTerm = borrowerAge ? Math.max(0, Math.min(40, 70 - Number(borrowerAge))) : 40;

            // โหลดประวัติและบัญชีดำบริษัทตอนเปิดแอพ พร้อมการสแกนลบข้อมูลประวัติที่เก่าเกิน 90 วัน
            useEffect(() => {
                const storedHistory = localStorage.getItem('loan_calc_history');
                if (storedHistory) {
                    try { 
                        const parsedHistory = JSON.parse(storedHistory);
                        const currentTime = Date.now();
                        
                        // คัดกรองเก็บไว้เฉพาะรายการที่มีอายุไม่เกิน 90 วัน
                        const validHistory = parsedHistory.filter(item => {
                            const recordAge = currentTime - Number(item.id || 0);
                            return recordAge < RETENTION_PERIOD_MS;
                        });

                        setHistory(validHistory);
                        
                        // หากประวัติมีการโดนลบเนื่องจากหมดอายุ ให้บันทึกอัปเดตลง localStorage ด้วย
                        if (validHistory.length !== parsedHistory.length) {
                            localStorage.setItem('loan_calc_history', JSON.stringify(validHistory));
                        }
                    } catch (e) { 
                        console.error(e); 
                    }
                }

                const storedWatchlist = localStorage.getItem('ghb_company_watchlist');
                if (storedWatchlist) {
                    try {
                        setWatchlist(JSON.parse(storedWatchlist));
                    } catch (e) {
                        setWatchlist(defaultWatchlist);
                    }
                } else {
                    setWatchlist(defaultWatchlist);
                    localStorage.setItem('ghb_company_watchlist', JSON.stringify(defaultWatchlist));
                }
            }, []);

            // ตรวจสอบชื่อหน่วยงานแบบ Realtime ค้นหาความเข้าข่ายบริษัทกลุ่มเสี่ยง
            useEffect(() => {
                if (!companyName.trim()) {
                    setMatchedWatchlistCompany(null);
                    return;
                }
                const match = watchlist.find(item => checkSimilarity(companyName, item.name));
                setMatchedWatchlistCompany(match || null);
            }, [companyName, watchlist]);

            useEffect(() => {
                if (customerName.trim()) {
                    document.title = `รายงานประเมินสินเชื่อ_${customerName.trim()}`;
                } else {
                    document.title = "โปรแกรมคำนวณรายได้สินเชื่อและประเมินความสามารถในการผ่อน";
                }
            }, [customerName]);

            useEffect(() => {
                if (customerType === 'welfare') {
                    setEmployeeType('monthly');
                    setMonthsCount(3);
                    setIsManufacturing(false);
                    setSlipType('standard');
                }
            }, [customerType]);

            const addVarColumn = () => {
                if (varColumns.length >= 8) {
                    setAlertMessage('จำกัดการเพิ่มหัวข้อรายได้แปรผันสูงสุดไม่เกิน 8 รายการครับ');
                    return;
                }
                const newId = `var_${Date.now()}`;
                const newCol = { id: newId, label: `รายได้แปรผันใหม่ ${varColumns.length + 1}` };
                setVarColumns([...varColumns, newCol]);

                const updatedData = incomeData.map(row => ({
                    ...row,
                    [newId]: 0
                }));
                setIncomeData(updatedData);
            };

            const removeVarColumn = (id) => {
                if (varColumns.length <= 1) {
                    setAlertMessage('ระบบต้องมีหัวข้อรายได้แปรผันอย่างน้อย 1 รายการครับ');
                    return;
                }
                setVarColumns(varColumns.filter(col => col.id !== id));
                
                const updatedData = incomeData.map(row => {
                    const copy = { ...row };
                    delete copy[id];
                    return copy;
                });
                setIncomeData(updatedData);
            };

            // ตรวจสอบความต่อเนื่องของรายได้เสริม
            const checkVarIncomeContinuity = (key) => {
                const limit = slipType === 'double' ? monthsCount * 2 : monthsCount;
                const subset = incomeData.slice(0, limit);

                if (slipType === 'double') {
                    const monthlySums = [];
                    for (let i = 0; i < monthsCount; i++) {
                        const sum = (subset[i * 2]?.[key] || 0) + (subset[i * 2 + 1]?.[key] || 0);
                        monthlySums.push(sum);
                    }
                    return monthlySums.every(val => val > 0);
                } else {
                    return subset.every(row => (row[key] || 0) > 0);
                }
            };

            // คำนวณรายได้แบบเฉลี่ย (ตามกฎความต่อเนื่อง)
            const calculateAdjustedVar = (key) => {
                const limit = slipType === 'double' ? monthsCount * 2 : monthsCount;
                const subset = incomeData.slice(0, limit);

                const isContinuous = checkVarIncomeContinuity(key);
                if (!isContinuous) return 0;

                if (slipType === 'double') {
                    const totalSum = subset.reduce((acc, row) => acc + (row[key] || 0), 0);
                    return Math.floor(totalSum / monthsCount);
                } else {
                    const sum = subset.reduce((acc, row) => acc + (row[key] || 0), 0);
                    return Math.floor(sum / monthsCount); 
                }
            };

            const activeRowsCount = slipType === 'double' ? monthsCount * 2 : monthsCount;
            const dataSubset = incomeData.slice(0, activeRowsCount);
            
            const finalBase = (employeeType === 'monthly' && slipType === 'standard') 
                ? (incomeData[0]?.baseSalary || 0) 
                : Math.floor(dataSubset.reduce((sum, row) => sum + row.baseSalary, 0) / monthsCount);

            const finalDeduction = (employeeType === 'monthly' && slipType === 'standard') 
                ? (incomeData[0]?.deduction || 0) 
                : Math.ceil(dataSubset.reduce((sum, row) => sum + row.deduction, 0) / monthsCount);
            
            const activeDebtBurden = debtBurden;
            const activeDeductionOther = hasExtraDeductions ? deductionOther : 0;
            const activeTaxManual = hasExtraDeductions ? taxManual : 0;

            const totalDeductions = Math.ceil(finalDeduction + activeDeductionOther + activeDebtBurden + activeTaxManual);
            const netBaseSalary = finalBase - totalDeductions;
            const hasSpecialSalaryThreshold = netBaseSalary >= 20000;

            useEffect(() => {
                if (customerType === 'welfare') {
                    setIsOverOneYear(false);
                    setIsStableCompany(false);
                }
            }, [customerType, netBaseSalary]);

            const isConstantEveryMonth = (key) => {
                const limit = slipType === 'double' ? monthsCount * 2 : monthsCount;
                const subset = incomeData.slice(0, limit);

                if (slipType === 'double') {
                    const monthlySums = [];
                    for (let i = 0; i < monthsCount; i++) {
                        const sum = (subset[i * 2]?.[key] || 0) + (subset[i * 2 + 1]?.[key] || 0);
                        monthlySums.push(sum);
                    }
                    const firstMonthSum = monthlySums[0] || 0;
                    return firstMonthSum > 0 && monthlySums.every(val => val === firstMonthSum);
                }

                const firstMonthValue = subset[0]?.[key] || 0;
                return firstMonthValue > 0 && subset.every(row => (row[key] || 0) === firstMonthValue);
            };

            const calculateVarIncomeWithCondition = (key) => {
                const avgVal = calculateAdjustedVar(key);
                if (customerType === 'welfare') {
                    return avgVal;
                }
                if (isManufacturing && !isConstantEveryMonth(key)) {
                    return Math.floor(avgVal * 0.8);
                }
                return avgVal;
            };
